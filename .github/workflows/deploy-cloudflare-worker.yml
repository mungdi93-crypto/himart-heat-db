# GitHub에 이 파일이 반드시 올라가 있어야 합니다. (Code 탭에서 wrangler-action 이 없는지 확인)
# Secret: CLOUDFLARE_API_TOKEN 필수. 계정: cloudflare/wrangler.toml 의 account_id

name: Deploy Cloudflare Worker (D1 API)

on:
  push:
    branches: [main, master]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: "★ 이 단계가 보이면 새 워크플로입니다 (구버전은 wrangler-action만 보임)"
        run: |
          echo "WORKFLOW_TAG=himart-npx-wrangler4-no-third-party-action"
          ls -la .github/workflows/
          if grep -r "cloudflare/wrangler-action" .github/workflows/ 2>/dev/null; then
            echo "::error::이 저장소에 아직 'cloudflare/wrangler-action' 이 들어 있는 YAML이 있습니다. 해당 파일을 삭제하거나 main에 최신 내용으로 덮어 푸시하세요."
            exit 1
          fi
          echo "OK: wrangler-action 미사용"

      - name: API 토큰 Secret 확인
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::GitHub 저장소 Settings → Secrets → CLOUDFLARE_API_TOKEN 이 비어 있거나 없습니다."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: cloudflare 폴더 확인
        run: ls -la cloudflare && ls -la cloudflare/src && head -20 cloudflare/wrangler.toml

      - name: Wrangler whoami
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4 whoami

      - name: Wrangler deploy
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_LOG: debug
        run: npx wrangler@4 deploy
