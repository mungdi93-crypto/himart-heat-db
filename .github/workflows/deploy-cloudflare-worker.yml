# Secret: CLOUDFLARE_API_TOKEN (저장소 Settings → Secrets → Actions)
# 계정·D1: cloudflare/wrangler.toml

name: Deploy Cloudflare Worker (D1 API)

on:
  push:
    branches: [main, master]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 워크플로·토큰·폴더 점검
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          echo "=== .github/workflows 목록 ==="
          ls -la .github/workflows/
          echo "=== wrangler-action 잔존 검사 ==="
          if grep -R "cloudflare/wrangler-action" .github/workflows/ 2>/dev/null; then
            echo "::error::wrangler-action 이 남아 있습니다. 제거 후 푸시하세요."
            exit 1
          fi
          echo "OK: wrangler-action 없음"
          echo "=== CLOUDFLARE_API_TOKEN 존재 여부(값은 출력 안 함) ==="
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Settings → Secrets and variables → Actions 에 CLOUDFLARE_API_TOKEN 추가"
            exit 1
          fi
          echo "OK: 토큰 Secret 존재"
          echo "=== cloudflare 디렉터리 ==="
          ls -la cloudflare
          ls -la cloudflare/src
          head -25 cloudflare/wrangler.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wrangler whoami
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@3.90.0 whoami

      - name: Wrangler deploy
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@3.90.0 deploy
