# Secrets: CLOUDFLARE_API_TOKEN (필수). account_id는 cloudflare/wrangler.toml 권장.
# 토큰: https://dash.cloudflare.com/profile/api-tokens → Workers Scripts Edit + D1 Edit

name: Deploy Cloudflare Worker (D1 API)

on:
  push:
    branches: [main, master]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

env:
  # GitHub Actions Node 20 경고 완화(2026년 이후 러너 기본값 대비)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # wrangler.toml 이 있는 디렉터리에서 실행해야 함
      - name: Verify Cloudflare token (whoami)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          command: whoami

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare
          wranglerVersion: "4"
          command: deploy
