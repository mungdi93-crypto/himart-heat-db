# PC에 Node 없이: GitHub 러너에서만 npx wrangler 실행
# Secret: CLOUDFLARE_API_TOKEN (필수). 계정은 cloudflare/wrangler.toml 의 account_id 사용

name: Deploy Cloudflare Worker (D1 API)

on:
  push:
    branches: [main, master]
    paths:
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 파일 확인
        run: ls -la cloudflare && ls -la cloudflare/src

      - name: Wrangler whoami (토큰·계정 확인)
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4 whoami

      - name: Wrangler deploy
        working-directory: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WRANGLER_LOG: debug
        run: npx wrangler@4 deploy
