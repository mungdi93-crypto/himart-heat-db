# Cloudflare Workers + D1 (체감온도 앱 백엔드)
# D1: 대시보드에서 생성 후 database_id 교체, SQL은 schema.sql 실행
# account_id: 대시보드 오른쪽 Account ID (GitHub Secret CLOUDFLARE_ACCOUNT_ID와 동일 값 권장)

name = "himart-heat-api"
account_id = "ee77be4ab1481c3776571b10aaf23f21"
main = "src/worker.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "himart-heat-db"
database_id = "0dbf32f1-fb48-4810-87ae-b5bddf4e7bb9"

[vars]
ALLOWED_ORIGIN = "*"
